name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.96"

jobs:
  preflight:
    name: Release Preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy,rustfmt
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Test all features
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo test --workspace --all-targets --all-features --locked -- --test-threads=1
      - name: Validate sample configs
        env:
          RUSTFLAGS: "-D warnings"
        run: bash ./scripts/check-config-samples.sh
      - name: Reject generated secrets and runtime artifacts
        run: bash ./scripts/check-sensitive-artifacts.sh
      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
      - name: Cargo audit
        uses: actions-rust-lang/audit@v1

  package-crates:
    name: Package Crates
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Package workspace crates
        run: cargo package --workspace --locked --allow-dirty --no-verify
      - name: Upload crate packages
        uses: actions/upload-artifact@v4
        with:
          name: qid-crates
          path: target/package/*.crate

  release-targets:
    name: Release Target (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
          - target: aarch64-apple-darwin
            os: macos-14
            use_cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            use_cross: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Install OpenSSL on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install openssl:x64-windows-static-md
          "VCPKG_ROOT=$env:VCPKG_INSTALLATION_ROOT" >> $env:GITHUB_ENV
          "VCPKGRS_TRIPLET=x64-windows-static-md" >> $env:GITHUB_ENV
      - name: Install cross
        if: ${{ matrix.use_cross }}
        uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Build release target
        env:
          RUSTFLAGS: "-D warnings"
          CARGO_TARGET_DIR: target/release-targets
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --workspace --release --locked --target ${{ matrix.target }}
          else
            cargo build --workspace --release --locked --target ${{ matrix.target }}
          fi
      - name: Package release binaries
        shell: bash
        run: |
          set -euo pipefail
          target="${{ matrix.target }}"
          exe=""
          case "$target" in
            *windows*) exe=".exe" ;;
          esac

          out_dir="target/release-targets/${target}/release"
          package_dir="dist/qid-${target}"
          mkdir -p "$package_dir"
          for bin in qidd qidc qid-agent qid-migrate qid-sync qid-worker; do
            cp "${out_dir}/${bin}${exe}" "$package_dir/"
          done
          cp README.md LICENSE* "$package_dir/" 2>/dev/null || true

          archive="dist/qid-${target}.tar.gz"
          tar -czf "$archive" -C dist "qid-${target}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi
      - name: Upload release target artifact
        uses: actions/upload-artifact@v4
        with:
          name: qid-${{ matrix.target }}
          path: |
            dist/qid-${{ matrix.target }}.tar.gz
            dist/qid-${{ matrix.target }}.tar.gz.sha256

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --all --format json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: qid-sbom
          path: ./*.json

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package-crates
      - release-targets
      - sbom
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
