name: Security & Compliance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.96"

jobs:
  sensitive-artifacts:
    name: Sensitive Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject generated secrets and runtime artifacts
        run: bash ./scripts/check-sensitive-artifacts.sh

  dependency-policy:
    name: Dependency Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features
      - name: Cargo audit
        uses: actions-rust-lang/audit@v1

  package-policy:
    name: Package Policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Verify lockfile and metadata
        run: cargo metadata --locked --format-version 1 >/tmp/qid-metadata.json
      - name: Package workspace crates
        run: cargo package --workspace --locked --allow-dirty --no-verify

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate CycloneDX SBOM
        run: cargo cyclonedx --all --format json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: qid-sbom
          path: ./*.json
