name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.96"

jobs:
  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Check workspace on MSRV
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo +${{ env.RUST_TOOLCHAIN }} check --workspace --all-targets --locked

  build-test:
    name: Build/Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: linux-aarch64
            os: ubuntu-24.04-arm
          - name: windows-x86_64
            os: windows-2022
          - name: macos-aarch64
            os: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Build workspace
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build --workspace --all-targets --locked
      - name: Test workspace
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo test --workspace --locked -- --test-threads=1

  all-features:
    name: All Features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Test all features
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo test --workspace --all-targets --all-features --locked -- --test-threads=1

  config-samples:
    name: Config Samples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Validate sample configs
        env:
          RUSTFLAGS: "-D warnings"
        run: bash ./scripts/check-config-samples.sh

  qpx-e2e-smoke:
    name: Sister PEP Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Run qid/qpx smoke
        env:
          RUSTFLAGS: "-D warnings"
        run: bash ./examples/qpx-e2e/run.sh

  fuzz-smoke:
    name: Fuzz Smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: nightly
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Run JWT fuzz smoke
        working-directory: fuzz
        run: cargo fuzz run jwt -- -max_total_time=30
      - name: Run SAML XML fuzz smoke
        working-directory: fuzz
        run: cargo fuzz run saml_xml -- -max_total_time=30
      - name: Run SCIM filter fuzz smoke
        working-directory: fuzz
        run: cargo fuzz run scim_filter -- -max_total_time=30

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      - name: Check coverage
        run: bash ./scripts/coverage.sh
