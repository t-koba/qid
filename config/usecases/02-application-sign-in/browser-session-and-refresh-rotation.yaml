profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/02-application-sign-in/browser-session-and-refresh-rotation.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: corp-sample-token
      realm_id: corp
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: corp
    issuer: "https://id.example.com/realms/corp"
    display_name: "Corp Session Policy"
    clients:
      - client_id: "corp-web"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-corp-web-secret"
        redirect_uris:
          - "https://app.example.com/callback"
        grant_types:
          - authorization_code
          - refresh_token
    protocols:
      oauth:
        tokens:
          access_token_format: jwt
          access_token_ttl_seconds: 900
          refresh_token_ttl_seconds: 1209600
          id_token_ttl_seconds: 900
          auth_code_ttl_seconds: 300
    authentication:
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
    sessions:
      browser:
        cookie_name: "__Host-qid"
        same_site: Lax
        idle_timeout_minutes: 20
        absolute_timeout_hours: 8
      refresh_tokens:
        rotation: true
        reuse_detection: revoke_family
    policy:
      default_decision: deny
      bundles:
        - name: authenticated-read
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
