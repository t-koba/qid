profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/02-application-sign-in/ciba-poll-client.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: bank-sample-token
      realm_id: bank
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: bank
    issuer: "https://id.example.com/realms/bank"
    display_name: "Bank Workforce"
    clients:
      - client_id: "call-center-console"
        client_type: confidential
        token_endpoint_auth_method: client_secret_post
        client_secret: "change-me-call-center-secret"
        grant_types:
          - "urn:openid:params:grant-type:ciba"
    protocols:
      oauth:
        ciba:
          enabled: true
          mode: poll
        introspection:
          enabled: true
          jwt_response: true
        tokens:
          access_token_format: jwt
          access_token_ttl_seconds: 600
        resource_servers:
          - audience: "api://bank/customer-care"
            resources:
              - "https://api.bank.example.com/customer-care"
            scopes:
              - care.read
              - care.write
            introspection_client_ids:
              - call-center-console
            high_risk: true
            require_sender_constraint: true
    authentication:
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
      mfa:
        allowed:
          - webauthn
          - totp
        totp:
          enabled: true
    policy:
      default_decision: deny
      bundles:
        - name: payments
          source: "file://../../policies/payments.json"
          mode: enforce
