profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/02-application-sign-in/passkeys-preferred.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: workforce-sample-token
      realm_id: workforce
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: workforce
    issuer: "https://id.example.com/realms/workforce"
    display_name: "Workforce Passkeys"
    clients:
      - client_id: "employee-portal"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-employee-portal-secret"
        redirect_uris:
          - "https://employee.example.com/callback"
        grant_types:
          - authorization_code
          - refresh_token
    authentication:
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
        rp_name: "Workforce Identity"
        attestation: none
      password:
        enabled: true
        hash: argon2id
      mfa:
        allowed:
          - webauthn
          - totp
        totp:
          enabled: true
    policy:
      default_decision: deny
      bundles:
        - name: authenticated-read
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
