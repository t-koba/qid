profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/02-application-sign-in/password-policy-lockout.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: retail-sample-token
      realm_id: retail
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: retail
    issuer: "https://id.example.com/realms/retail"
    display_name: "Retail Accounts"
    clients:
      - client_id: "retail-web"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-retail-web-secret"
        redirect_uris:
          - "https://retail.example.com/callback"
        grant_types:
          - authorization_code
          - refresh_token
    authentication:
      passkeys:
        enabled: true
        preferred: false
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
      password:
        enabled: true
        hash: argon2id
        pepper_ref: "secret://qid/retail/password-pepper"
        max_failed_attempts: 5
        lockout_duration_seconds: 900
        argon2id:
          memory_kib: 65536
          time_cost: 3
          parallelism: 2
      mfa:
        allowed:
          - totp
          - webauthn
        totp:
          enabled: true
    policy:
      default_decision: deny
      bundles:
        - name: authenticated-read
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
