profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/02-application-sign-in/passwordless-passkeys-only.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: admins-sample-token
      realm_id: admins
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: admins
    issuer: "https://id.example.com/realms/admins"
    display_name: "Passwordless Administrators"
    clients:
      - client_id: "admin-console"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-admin-console-secret"
        redirect_uris:
          - "https://admin.example.com/callback"
        grant_types:
          - authorization_code
    authentication:
      passwordless_only: true
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
        rp_name: "qid Admin"
        attestation: enterprise
      password:
        enabled: false
      mfa:
        required_for_admins: true
        allowed:
          - webauthn
    sessions:
      browser:
        idle_timeout_minutes: 10
        absolute_timeout_hours: 4
    policy:
      default_decision: deny
      bundles:
        - name: admin
          source: "file://../../policies/admin.json"
          mode: enforce
