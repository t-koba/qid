profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/03-api-and-service-access/dynamic-client-registration-controlled.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: partners-sample-token
      realm_id: partners
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: partners
    issuer: "https://id.example.com/realms/partners"
    display_name: "Partner Registration"
    clients:
      - client_id: "partner-admin"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-partner-admin-secret"
        redirect_uris:
          - "https://partners.example.com/callback"
        grant_types:
          - authorization_code
    protocols:
      oauth:
        dynamic_client_registration:
          enabled: true
          allow_open_registration: false
        private_key_jwt:
          enabled: true
        mtls:
          enabled: true
        tokens:
          access_token_format: jwt
          access_token_ttl_seconds: 900
        resource_servers:
          - audience: "api://partners/registration"
            resources:
              - "https://partners.example.com/api/registration"
            scopes:
              - client.register
              - client.manage
            introspection_client_ids:
              - partner-admin
            require_sender_constraint: true
    policy:
      default_decision: deny
      bundles:
        - name: api
          source: "file://../../policies/api.json"
          mode: enforce
