profile: fapi

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/03-api-and-service-access/fapi2-payments-high-risk.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: payments-sample-token
      realm_id: payments
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"
  http_message_signatures:
    enabled: true
    keys:
      - key_id: "fapi-payments-2026-06"
        shared_secret: "fedcba9876543210fedcba9876543210"
      - key_id: "fapi-payments-2026-09"
        shared_secret: "0123456789abcdef0123456789abcdef"
    max_age_seconds: 180
    require_content_digest: true

realms:
  - id: payments
    issuer: "https://id.example.com/realms/payments"
    display_name: "Payments FAPI"
    clients:
      - client_id: "treasury-web"
        client_type: confidential
        token_endpoint_auth_method: tls_client_auth
        mtls_certificate_thumbprints:
          - "47DEQpj8HBSa-_TImW-5JCeuQeRkm5NMpJWZG3hSuFU"
        redirect_uris:
          - "https://treasury.example.com/callback"
        grant_types:
          - authorization_code
          - refresh_token
    protocols:
      oidc:
        authorization_code:
          enabled: true
          pkce_required: true
          require_signed_request_object: true
          request_object_signing_alg_values:
            - ES256
        implicit:
          enabled: false
        ropc:
          enabled: false
      oauth:
        introspection:
          enabled: true
          jwt_response: true
        par:
          enabled: true
          required_for:
            - treasury-web
        rar:
          enabled: true
        dpop:
          enabled: true
          replay_cache: true
          nonce: true
        mtls:
          enabled: true
        private_key_jwt:
          enabled: true
        jarm:
          enabled: true
        require_pushed_authorization_requests: true
        tokens:
          access_token_format: jwt
          access_token_ttl_seconds: 300
          refresh_token_ttl_seconds: 43200
          id_token_ttl_seconds: 300
        resource_servers:
          - audience: "api://payments/domestic"
            resources:
              - "https://api.payments.example.com/domestic"
            scopes:
              - payments.domestic.read
              - payments.domestic.write
            introspection_client_ids:
              - domestic-payments-api
            require_sender_constraint: true
            high_risk: true
          - audience: "api://payments/wire"
            resources:
              - "https://api.payments.example.com/wire"
            scopes:
              - payments.wire.read
              - payments.wire.write
            introspection_client_ids:
              - wire-payments-api
            require_sender_constraint: true
            high_risk: true
    authentication:
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
      mfa:
        required_for_admins: true
        allowed:
          - webauthn
          - totp
        totp:
          enabled: true
    policy:
      default_decision: deny
      bundles:
        - name: payments
          source: "file://../../policies/payments.json"
          mode: enforce
