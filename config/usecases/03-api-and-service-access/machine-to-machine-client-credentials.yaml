profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/03-api-and-service-access/machine-to-machine-client-credentials.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: corp-sample-token
      realm_id: corp
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: corp
    issuer: "https://id.example.com/realms/corp"
    display_name: "Corp Service Accounts"
    clients:
      - client_id: "billing-worker"
        id: "client-billing-worker"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-billing-worker-secret"
        grant_types:
          - client_credentials
    protocols:
      oauth:
        default_scope: "billing.read billing.write"
        private_key_jwt:
          enabled: true
        mtls:
          enabled: true
        tokens:
          access_token_format: jwt
          access_token_ttl_seconds: 600
        resource_servers:
          - audience: "api://corp/billing"
            resources:
              - "https://api.example.com/billing"
            scopes:
              - billing.read
              - billing.write
            introspection_client_ids:
              - billing-worker
            require_sender_constraint: true
    policy:
      default_decision: deny
      bundles:
        - name: api
          source: "file://../../policies/api.json"
          mode: enforce
