profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/03-api-and-service-access/par-rar-authorization-details.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: finance-sample-token
      realm_id: finance
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: finance
    issuer: "https://id.example.com/realms/finance"
    display_name: "Finance Authorization"
    clients:
      - client_id: "expense-app"
        client_type: confidential
        token_endpoint_auth_method: private_key_jwt
        jwks:
          keys:
            - kty: EC
              crv: P-256
              kid: "expense-app-signing"
              use: sig
              alg: ES256
              x: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
              y: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
        redirect_uris:
          - "https://expense.example.com/callback"
        grant_types:
          - authorization_code
          - refresh_token
    protocols:
      oidc:
        authorization_code:
          enabled: true
          pkce_required: true
          require_signed_request_object: true
      oauth:
        par:
          enabled: true
          required_for:
            - expense-app
        rar:
          enabled: true
        private_key_jwt:
          enabled: true
        require_pushed_authorization_requests: true
        tokens:
          access_token_format: jwt
          access_token_ttl_seconds: 900
        resource_servers:
          - audience: "api://finance/expenses"
            resources:
              - "https://api.example.com/expenses"
            scopes:
              - expenses.read
              - expenses.approve
            introspection_client_ids:
              - expense-api
            require_sender_constraint: true
            high_risk: true
    authentication:
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
      mfa:
        allowed:
          - webauthn
          - totp
        totp:
          enabled: true
    policy:
      default_decision: deny
      bundles:
        - name: payments
          source: "file://../../policies/payments.json"
          mode: enforce
