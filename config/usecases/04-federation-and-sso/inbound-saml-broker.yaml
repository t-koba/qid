profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/04-federation-and-sso/inbound-saml-broker.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: suppliers-sample-token
      realm_id: suppliers
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: suppliers
    issuer: "https://id.example.com/realms/suppliers"
    display_name: "Supplier Federation"
    clients:
      - client_id: "supplier-portal"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-supplier-portal-secret"
        redirect_uris:
          - "https://suppliers.example.com/callback"
        grant_types:
          - authorization_code
    protocols:
      federation:
        enabled: true
        inbound_providers:
          - id: supplier-saml
            kind: saml
            issuer: "https://idp.supplier.example.com/metadata"
            enabled: true
            domains:
              - supplier.example.com
            jit_provisioning: true
            account_linking: true
            claim_mappings:
              - source: NameID
                target: external_subject
                required: true
              - source: email
                target: email
                required: true
            saml_signing_certificates:
              - |
                -----BEGIN CERTIFICATE-----
                MIIC/zCCAeegAwIBAgIUBklt5yFAf9IfAMSY3gfu71ytLNkwDQYJKoZIhvcNAQEL
