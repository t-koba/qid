profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/04-federation-and-sso/saml-to-oidc-migration.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: workforce-sample-token
      realm_id: workforce
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: workforce
    issuer: "https://id.example.com/realms/workforce"
    display_name: "SAML to OIDC Migration"
    clients:
      - client_id: "modern-oidc-app"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-modern-oidc-app-secret"
        redirect_uris:
          - "https://modern.example.com/oauth/callback"
        grant_types:
          - authorization_code
          - refresh_token
    protocols:
      saml:
        enabled: true
        sign_assertions: true
        sign_metadata: true
        idp_signing_key_pem_path: "/etc/qid/saml/idp-signing.key"
        service_providers:
          - entity_id: "https://legacy.example.com/saml/metadata"
            acs_url: "https://legacy.example.com/saml/acs"
            name_id_formats:
              - "urn:oasis:names:tc:SAML:2.0:nameid-format:persistent"
            attribute_release_policy:
              - email
              - displayName
              - groups
            signing_certificates:
              - |
                -----BEGIN CERTIFICATE-----
                MIIC/zCCAeegAwIBAgIUBklt5yFAf9IfAMSY3gfu71ytLNkwDQYJKoZIhvcNAQEL
                BQAwDzENMAsGA1UEAwwEdGVzdDAeFw0yNjA2MjMxNjAwMThaFw0yNzA2MjMxNjAw
                MThaMA8xDTALBgNVBAMMBHRlc3QwggEiMA0GCSqGSIb3DQEBAQUAA4IBDwAwggEK
