      federation:
        enabled: true
        inbound_providers:
          - id: legacy-saml-idp
            kind: saml
            issuer: "https://old-idp.example.com/metadata"
            enabled: true
            domains:
              - example.com
            jit_provisioning: true
            account_linking: true
            saml_signing_certificates:
              - "MIIBlegacyIdpSigning"
            claim_mappings:
              - source: NameID
                target: external_subject
                required: true
              - source: mail
                target: email
                required: true
    authentication:
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
      password:
        enabled: true
    policy:
      default_decision: deny
      bundles:
        - name: authenticated-read
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
