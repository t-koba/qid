profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/05-lifecycle-and-provisioning/multi-directory-authority.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: workforce-sample-token
      realm_id: workforce
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

realms:
  - id: workforce
    issuer: "https://id.example.com/realms/workforce"
    display_name: "Multiple Directory Authorities"
    clients:
      - client_id: "directory-console"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-directory-console-secret"
        redirect_uris:
          - "https://directory.example.com/callback"
        grant_types:
          - authorization_code
    protocols:
      directory:
        enabled: true
        default_provider_id: corp-ad
        providers:
          - id: corp-ad
            type: active-directory
            enabled: true
            connection:
              url: "ldaps://ad.corp.example.com:636"
              bind_dn: "CN=qid-sync,OU=Service Accounts,DC=corp,DC=example,DC=com"
              bind_password: "secret://qid/directory/corp-ad"
              base_dn: "DC=corp,DC=example,DC=com"
              tls_insecure_skip_verify: false
            sync:
              user_search_filter: "(objectClass=user)"
              group_search_filter: "(objectClass=group)"
              sync_interval_minutes: 10
              deactivate_missing: true
              full_sync_on_start: true
          - id: acquired-ldap
            type: ldap
            enabled: true
            connection:
              url: "ldaps://ldap.acquired.example.net:636"
              bind_dn: "uid=qid-sync,ou=svc,dc=acquired,dc=example,dc=net"
              bind_password: "secret://qid/directory/acquired-ldap"
              base_dn: "dc=acquired,dc=example,dc=net"
              tls_insecure_skip_verify: false
            sync:
              user_search_filter: "(objectClass=person)"
              group_search_filter: "(objectClass=groupOfNames)"
              sync_interval_minutes: 30
              deactivate_missing: false
              full_sync_on_start: false
    authentication:
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
      password:
        enabled: true
    policy:
      default_decision: deny
      bundles:
        - name: authenticated-read
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
