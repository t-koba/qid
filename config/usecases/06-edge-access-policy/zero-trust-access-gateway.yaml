profile: edge-pep

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/06-edge-access-policy/zero-trust-access-gateway.json"

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"
  http_message_signatures:
    enabled: true
    shared_secret: "0123456789abcdef0123456789abcdef"
    key_id: "ztna-edge-2026-06"
    max_age_seconds: 120
    require_content_digest: true

crypto:
  keyrings:
    - name: ztna-pep-assertion
      realm_id: access
      purposes:
        - pep_assertion
      signer:
        type: local

realms:
  - id: access
    issuer: "https://id.example.com/realms/access"
    display_name: "Zero Trust Access Gateway"
    clients:
      - client_id: "ztna-gateway"
        client_type: confidential
        token_endpoint_auth_method: tls_client_auth
        mtls_certificate_thumbprints:
          - "47DEQpj8HBSa-_TImW-5JCeuQeRkm5NMpJWZG3hSuFU"
        grant_types:
          - client_credentials
    protocols:
      oauth:
        mtls:
          enabled: true
        introspection:
          enabled: true
          jwt_response: true
        tokens:
          access_token_format: jwt
          access_token_ttl_seconds: 180
        resource_servers:
          - audience: "api://access/ztna"
            resources:
              - "https://id.example.com/access/v1/check"
            scopes:
              - access.evaluate
              - access.assert
            introspection_client_ids:
              - ztna-gateway
            require_sender_constraint: true
            high_risk: true
    pep_registrations:
      enabled: true
      registrations:
        - name: ztna-gateway-main
          audience: "urn:qid:pep:access/ztna-gateway-main"
          capabilities:
            - effect: challenge
            - effect: inject_headers
            - effect: local_response
            - effect: override_upstream
            - effect: cache_bypass
            - effect: mirror_upstreams
            - effect: force_inspect
            - effect: force_tunnel
            - effect: rate_limit
            - effect: policy_tags
            - effect: rate_limit_profile
          assertion:
            header: "x-qid-access-assertion"
            ttl_seconds: 30
            alg: ES256
          decision:
            endpoint: "/pep/decision/v1/evaluate"
            fail_policy: deny
            cache:
              positive_ttl_seconds: 10
              negative_ttl_seconds: 2
    policy:
      default_decision: deny
      bundles:
        - name: pep-edge
          source: "file://../../policies/pep-edge.json"
          mode: enforce
    authentication:
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
      mfa:
        allowed:
          - passkey
          - client_certificate
        client_certificate:
          enabled: true
          allowed_certificate_attributes:
            - san_uri
