profile: vc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/08-verifiable-credentials/oid4vci-haip.json"

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"
  http_message_signatures:
    enabled: true
    shared_secret: "0123456789abcdef0123456789abcdef"
    key_id: "vc-ingress-2026-06"
    max_age_seconds: 300
    require_content_digest: true

crypto:
  default_alg: ES256
  keyrings:
    - name: vc-issuer
      realm_id: wallet
      purposes:
        - other:vc_issuer
      signer:
        type: local

realms:
  - id: wallet
    issuer: "https://id.example.com/realms/wallet"
    display_name: "VC Issuer"
    clients:
      - client_id: "wallet-app"
        client_type: public
        token_endpoint_auth_method: none
        redirect_uris:
          - "https://wallet.example.com/callback"
        grant_types:
          - authorization_code
          - refresh_token
    protocols:
      vc:
        oid4vci: true
        oid4vp: true
        haip: true
        vc_data_model_2_0: true
        jose_cose: true
        status_list: true
        holder_binding_required: true
        issuer_key_ref: "vc-issuer"
      oidc:
        authorization_code:
          enabled: true
          pkce_required: true
          require_signed_request_object: true
          request_object_signing_alg_values:
            - ES256
            - EdDSA
        implicit:
          enabled: false
        ropc:
          enabled: false
      oauth:
        introspection:
          enabled: true
          jwt_response: true
        par:
          enabled: true
          required_for:
            - wallet-app
        rar:
          enabled: true
        dpop:
          enabled: true
          replay_cache: true
          nonce: true
        mtls:
          enabled: true
        private_key_jwt:
          enabled: true
        jarm:
          enabled: true
        require_pushed_authorization_requests: true
        tokens:
          access_token_format: jwt
          access_token_ttl_seconds: 600
          refresh_token_ttl_seconds: 86400
          id_token_ttl_seconds: 600
        resource_servers:
          - audience: "api://qid/vc"
            resources:
              - "https://id.example.com/vc/v1"
            scopes:
              - vc.issue
              - vc.verify
            introspection_client_ids:
              - vc-api
            require_sender_constraint: true
            high_risk: true
    authentication:
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
    policy:
      default_decision: deny
      bundles:
        - name: authenticated-read
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
