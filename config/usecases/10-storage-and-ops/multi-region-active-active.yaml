profile: oidc

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

storage:
  primary:
    type: postgres
    url_env: QID_DATABASE_URL

crypto:
  default_alg: ES256
  keyrings:
    - name: corp-sample-token
      realm_id: corp
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

ops:
  cache:
    kind: redis
    endpoints:
      - "redis://redis-us-east-1.internal.example.com:6379"
      - "redis://redis-us-west-2.internal.example.com:6379"
    key_prefix: qid-global
    ttl_seconds: 30
  cluster:
    cluster_id: "qid-prod-global"
    region: "us-east-1"
    node_id: "qid-prod-use1-a"
    leader_lease_ttl_seconds: 15
    multi_region_active_active: true
  backup:
    enabled: true
    object_store_uri: "s3://qid-prod-backups/global"
    migration_version: "20250628000002"

realms:
  - id: corp
    issuer: "https://id.example.com/realms/corp"
    display_name: "Global Workforce"
    clients:
      - client_id: "corp-web"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-corp-web-secret"
        redirect_uris:
          - "https://app.example.com/callback"
        grant_types:
          - authorization_code
    authentication:
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
    policy:
      default_decision: deny
      bundles:
        - name: authenticated-read
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
