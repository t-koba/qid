profile: oidc

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

storage:
  primary:
    type: postgres
    url_env: QID_DATABASE_URL

crypto:
  default_alg: ES256
  keyrings:
    - name: corp-sample-token
      realm_id: corp
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

realms:
  - id: corp
    issuer: "https://id.example.com/realms/corp"
    display_name: "Postgres State"
    clients:
      - client_id: "corp-web"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-corp-web-secret"
        redirect_uris:
          - "https://app.example.com/callback"
        grant_types:
          - authorization_code
    policy:
      default_decision: deny
      bundles:
        - name: authenticated-read
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
