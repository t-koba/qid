profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/11-observability-debug/metrics-loopback.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: corp-sample-token
      realm_id: corp
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

observability:
  metrics:
    listen: "127.0.0.1:9464"

realms:
  - id: corp
    issuer: "https://id.example.com/realms/corp"
    display_name: "Loopback Metrics"
    clients:
      - client_id: "metrics-loopback-client"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-metrics-loopback-client-secret"
        redirect_uris:
          - "https://metrics.example.com/callback"
        grant_types:
          - authorization_code
    policy:
      default_decision: deny
      bundles:
        - name: authenticated-read
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
