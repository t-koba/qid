profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/11-observability-debug/pii-redaction.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: retail-sample-token
      realm_id: retail
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

observability:
  logs:
    format: json
    redact_pii: true
  metrics:
    listen: "127.0.0.1:9464"
  audit:
    sink:
      type: file
      path: "/var/log/qid/redacted-audit.jsonl"
    include:
      - event_id
      - realm_id
      - client_id
      - policy_decision
      - risk_score

realms:
  - id: retail
    issuer: "https://id.example.com/realms/retail"
    display_name: "Retail Redaction"
    clients:
      - client_id: "retail-web"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-retail-web-secret"
        redirect_uris:
          - "https://retail.example.com/callback"
        grant_types:
          - authorization_code
    policy:
      default_decision: deny
      bundles:
        - name: authenticated-read
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
