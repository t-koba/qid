profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/13-operator-governance/breakglass-admin-approval.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: admin-sample-token
      realm_id: admin
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "0.0.0.0:8443"
  public_base_url: "https://id.example.com"

admin:
  security:
    require_reason: true
    require_step_up: true
    required_acr: "urn:qid:acr:phishing-resistant"
    required_amr:
      - hwk
      - webauthn
      - passkey
    max_elevation_seconds: 300
    require_approval: true
    max_approval_age_seconds: 600
    breakglass_enabled: true

realms:
  - id: admin
    issuer: "https://id.example.com/realms/admin"
    display_name: "Admin Governance"
    clients:
      - client_id: "admin-console"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-admin-console-secret"
        redirect_uris:
          - "https://admin.example.com/callback"
        grant_types:
          - authorization_code
          - refresh_token
    authentication:
      passwordless_only: true
      passkeys:
        enabled: true
        preferred: true
        rp_id: "id.example.com"
        rp_origin: "https://id.example.com"
        attestation: enterprise
      mfa:
        required_for_admins: true
        allowed:
          - passkey
          - client_certificate
        client_certificate:
          enabled: true
          allowed_certificate_attributes:
            - subject_cn
            - san_uri
    policy:
      default_decision: deny
      bundles:
        - name: admin
          source: "file://../../policies/admin.json"
          mode: enforce
