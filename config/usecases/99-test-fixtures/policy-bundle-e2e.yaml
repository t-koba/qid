profile: oidc

storage:
  primary:
    type: file
    url: "config/usecases/data/runtime/99-test-fixtures/policy-bundle-e2e.json"

crypto:
  default_alg: ES256
  keyrings:
    - name: e2e-sample-token
      realm_id: e2e
      purposes: [oidc_token]
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

server:
  listen: "127.0.0.1:18081"
  public_base_url: "http://localhost:18081"

realms:
  - id: e2e
    issuer: "http://localhost:18081/realms/e2e"
    display_name: "Policy E2E"
    clients:
      - client_id: "e2e-api-client"
        client_type: confidential
        token_endpoint_auth_method: client_secret_basic
        client_secret: "change-me-e2e-api-client-secret"
        grant_types:
          - client_credentials
    protocols:
      oauth:
        resource_servers:
          - audience: "api://e2e"
            resources:
              - "http://localhost:18081/api"
            scopes:
              - e2e.read
            introspection_client_ids:
              - e2e-api-client
            require_sender_constraint: true
    policy:
      default_decision: deny
      bundles:
        - name: e2e
          source: "file://../../policies/authenticated-read.json"
          mode: enforce
