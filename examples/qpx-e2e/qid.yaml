server:
  listen: "127.0.0.1:8443"
  public_base_url: "https://id.example.com"

storage:
  primary:
    type: sqlite
    url: "sqlite:qid-e2e.db"

crypto:
  default_alg: ES256
  keyrings:
    - name: e2e-main
      realm_id: e2e
      purposes:
        - oidc_token
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90
    - name: e2e-pep-assertion
      realm_id: e2e
      purposes:
        - pep_assertion
      signer:
        type: local
      rotation:
        overlap_days: 14
        max_age_days: 90

realms:
  - id: e2e
    issuer: "https://id.example.com/realms/e2e"
    display_name: "E2E Realm"
    clients:
      - client_id: "qpx-smoke"
        id: "client-qpx-smoke"
        client_type: confidential
        token_endpoint_auth_method: client_secret_post
        client_secret: "qpx-smoke-secret"
        grant_types:
          - client_credentials
    protocols:
      oidc:
        enabled: true
        authorization_code:
          enabled: true
          pkce_required: true
        implicit:
          enabled: false
        ropc:
          enabled: false
        logout:
          backchannel: true
          frontchannel: true
      oauth:
        introspection: true
        revocation: true
        dynamic_client_registration: false
        resource_servers:
          - audience: "qpx"
            resources:
              - "urn:qid:pep:qpx:edge/e2e-egress"
            scopes:
              - api
            introspection_client_ids:
              - qpx-edge-egress-main
            require_sender_constraint: false
    authentication:
      passkeys:
        enabled: false
      password:
        enabled: true
        hash: argon2id
    sessions:
      browser:
        cookie_name: "__Host-qid"
        same_site: Lax
        idle_timeout_minutes: 30
        absolute_timeout_hours: 12
    pep_registrations:
      enabled: true
      registrations:
        - name: e2e-egress
          audience: "qpx"
          assertion:
            header: "x-qid-assertion"
            ttl_seconds: 60
            alg: ES256
          decision:
            endpoint: "/pep/decision/v1/evaluate"
            fail_policy: deny
    policy:
      bundles:
        - name: default
          source: policy.json
          mode: enforce
      default_decision: deny

observability:
  logs:
    format: json
  metrics:
    listen: "127.0.0.1:9464"
