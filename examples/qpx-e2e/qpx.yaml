state_dir: "${QPX_STATE_DIR:-./qpx-state}"
identity:
  proxy_name: qpx-e2e
security:
  identity_sources:
  - name: qid-signed-assertion
    type: signed_assertion
    assertion:
      header: x-qid-assertion
      algorithms:
      - ES256
      issuer: "https://id.example.com/realms/e2e"
      audience: qpx
      public_key_env: QPX_ASSERTION_PUBLIC_KEY
      claims:
        user_from_sub: true
        groups: groups
        tenant: tenant
        auth_strength: acr
        idp: iss
        groups_separator: ","
  decisions:
    decision:
    - name: qid-central-policy
      endpoint: http://127.0.0.1:8443/pep/decision/v1/evaluate
      timeout_ms: 300
      send:
        request: true
        identity: true
      on_error: deny
edges:
- kind: forward
  name: e2e-egress
  listen: 127.0.0.1:18088
  default_action:
    type: block
  rules:
  - name: allow-authenticated
    match:
      host:
      - "*"
      identity:
        user:
        - "*"
    action:
      type: direct
  policy_context:
    identity_sources:
    - qid-signed-assertion
